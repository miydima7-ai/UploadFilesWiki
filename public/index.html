<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Файловый сервер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 40px;
        }

        .upload-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
            border: 2px dashed #667eea;
            text-align: center;
        }

        .upload-section h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
            background: #667eea;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            transition: all 0.3s;
            margin: 20px 0;
        }

        .file-input-wrapper:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .upload-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .upload-btn:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .files-section h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .files-list {
            display: grid;
            gap: 15px;
        }

        .file-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            border: 1px solid #e9ecef;
        }

        .file-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .file-details {
            font-size: 0.9em;
            color: #666;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-download {
            background: #007bff;
            color: white;
        }

        .btn-download:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 Файловый сервер</h1>
            <p>Загружайте и скачивайте файлы</p>
            <a href="/wikipedia" style="display: inline-block; margin-top: 20px; padding: 12px 30px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 10px; transition: all 0.3s; border: 2px solid white;">📚 Мини Википедия</a>
        </div>
        <div class="content">
            <div class="upload-section">
                <h2>Загрузить файл</h2>
                <form id="uploadForm">
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" name="file" required>
                        <span>Выбрать файл</span>
                    </div>
                    <div id="fileName" style="margin: 10px 0; color: #666;"></div>
                    <button type="submit" class="upload-btn" id="uploadBtn">Загрузить</button>
                </form>
                <div id="message" class="message"></div>
            </div>

            <div class="files-section">
                <h2>Загруженные файлы</h2>
                <div id="filesList" class="files-list">
                    <div class="loading">Загрузка файлов...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const uploadForm = document.getElementById('uploadForm');
        const uploadBtn = document.getElementById('uploadBtn');
        const message = document.getElementById('message');
        const filesList = document.getElementById('filesList');

        // Показываем имя выбранного файла
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileName.textContent = `Выбран файл: ${e.target.files[0].name}`;
            }
        });

        // Обработка загрузки файла
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Загрузка...';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Файл успешно загружен!', 'success');
                    uploadForm.reset();
                    fileName.textContent = '';
                    loadFiles();
                } else {
                    showMessage(data.error || 'Ошибка при загрузке файла', 'error');
                }
            } catch (error) {
                showMessage('Ошибка при загрузке файла', 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Загрузить';
            }
        });

        // Загрузка списка файлов
        async function loadFiles() {
            try {
                const response = await fetch('/files');
                const files = await response.json();

                if (files.length === 0) {
                    filesList.innerHTML = '<div class="empty">Нет загруженных файлов</div>';
                    return;
                }

                filesList.innerHTML = files.map(file => `
                    <div class="file-item">
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-details">
                                Размер: ${formatFileSize(file.size)} | 
                                Дата: ${new Date(file.date).toLocaleString('ru-RU')}
                            </div>
                        </div>
                        <div class="file-actions">
                            <a href="/download/${encodeURIComponent(file.name)}" class="btn btn-download">Скачать</a>
                            <button onclick="deleteFile('${file.name}')" class="btn btn-delete">Удалить</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                filesList.innerHTML = '<div class="empty">Ошибка при загрузке списка файлов</div>';
            }
        }

        // Удаление файла
        async function deleteFile(filename) {
            if (!confirm(`Удалить файл "${filename}"?`)) {
                return;
            }

            try {
                const response = await fetch(`/delete/${encodeURIComponent(filename)}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Файл успешно удален', 'success');
                    loadFiles();
                } else {
                    showMessage(data.error || 'Ошибка при удалении файла', 'error');
                }
            } catch (error) {
                showMessage('Ошибка при удалении файла', 'error');
            }
        }

        // Форматирование размера файла
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Показ сообщений
        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);
        }

        // Загружаем файлы при загрузке страницы
        loadFiles();
    </script>
</body>
</html>
